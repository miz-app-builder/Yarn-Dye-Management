openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Yarn Dyeing Management System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: Auth
    description: Browser and mobile authentication endpoints.
  - name: Storage
    description: Object storage upload and serving endpoints.
  - name: factories
    description: Factory management
  - name: users
    description: User management
  - name: dashboard
    description: Dashboard aggregates
  - name: reports
    description: Reporting
  - name: yarnDyeingOrders
    description: Yarn dyeing order management (new table)

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.
  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: iss
          in: query
          required: false
          schema:
            type: string
            format: uri
      responses:
        '302':
          description: Redirect to the returnTo path on success.
  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '302':
          description: Redirect to the OIDC provider logout URL.

  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadUrlRequest'
      responses:
        '200':
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadUrlResponse'
        '400':
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /storage/objects/{objectPath}:
    get:
      tags: [Storage]
      operationId: getStorageObject
      summary: Serve an object entity from PRIVATE_OBJECT_DIR
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content streamed.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: Not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  # ── FACTORIES ──────────────────────────────────────────────────────────────
  /factories:
    get:
      tags: [factories]
      operationId: listFactories
      summary: List all factories
      parameters:
        - name: includeArchived
          in: query
          required: false
          schema:
            type: boolean
      responses:
        '200':
          description: List of factories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Factory'
    post:
      tags: [factories]
      operationId: createFactory
      summary: Create a new factory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FactoryInput'
      responses:
        '201':
          description: Factory created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Factory'

  /factories/{id}:
    get:
      tags: [factories]
      operationId: getFactory
      summary: Get a factory by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Factory found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Factory'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    patch:
      tags: [factories]
      operationId: updateFactory
      summary: Update a factory
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FactoryUpdate'
      responses:
        '200':
          description: Factory updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Factory'
    delete:
      tags: [factories]
      operationId: archiveFactory
      summary: Archive a factory (soft delete)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Factory archived
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Factory'

  # ── YARN DYEING ORDERS ─────────────────────────────────────────────────────
  /yarn-dyeing-orders:
    get:
      tags: [yarnDyeingOrders]
      operationId: listYarnDyeingOrders
      summary: List yarn dyeing orders with optional filters
      parameters:
        - name: factoryId
          in: query
          required: false
          schema:
            type: integer
        - name: orderType
          in: query
          required: false
          schema:
            type: string
            enum: [Sample, Bulk]
        - name: status
          in: query
          required: false
          schema:
            type: string
        - name: dateFrom
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: dateTo
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Paginated yarn dyeing order list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/YarnDyeingOrderListResponse'
    post:
      tags: [yarnDyeingOrders]
      operationId: createYarnDyeingOrder
      summary: Create a new yarn dyeing order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/YarnDyeingOrderInput'
      responses:
        '201':
          description: Order created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/YarnDyeingOrderDetail'

  /yarn-dyeing-orders/{id}:
    get:
      tags: [yarnDyeingOrders]
      operationId: getYarnDyeingOrder
      summary: Get a yarn dyeing order by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Order found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/YarnDyeingOrderDetail'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    patch:
      tags: [yarnDyeingOrders]
      operationId: updateYarnDyeingOrder
      summary: Update a yarn dyeing order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/YarnDyeingOrderUpdate'
      responses:
        '200':
          description: Order updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/YarnDyeingOrder'
    delete:
      tags: [yarnDyeingOrders]
      operationId: deleteYarnDyeingOrder
      summary: Delete a yarn dyeing order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'

  # ── DASHBOARD ──────────────────────────────────────────────────────────────
  /dashboard/summary:
    get:
      tags: [dashboard]
      operationId: getDashboardSummary
      summary: Get dashboard summary counts and KG totals
      responses:
        '200':
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardSummary'

  /dashboard/factory-performance:
    get:
      tags: [dashboard]
      operationId: getFactoryPerformance
      summary: Get per-factory order performance stats
      responses:
        '200':
          description: Factory performance list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FactoryPerformance'

  /dashboard/recent-activity:
    get:
      tags: [dashboard]
      operationId: getRecentActivity
      summary: Get recent order status changes
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: Recent activity list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ActivityItem'

  # ── REPORTS ────────────────────────────────────────────────────────────────
  /reports/daily:
    get:
      tags: [reports]
      operationId: getDailyReport
      summary: Get daily order report
      parameters:
        - name: date
          in: query
          required: false
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Daily report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DailyReport'

  /reports/monthly:
    get:
      tags: [reports]
      operationId: getMonthlyReport
      summary: Get monthly order report
      parameters:
        - name: year
          in: query
          required: false
          schema:
            type: integer
        - name: month
          in: query
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: Monthly report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MonthlyReport'

  /reports/factory:
    get:
      tags: [reports]
      operationId: getFactoryReport
      summary: Get factory-wise report
      parameters:
        - name: factoryId
          in: query
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: Factory report
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FactoryReport'

  /reports/buyer:
    get:
      tags: [reports]
      operationId: getBuyerReport
      summary: Get buyer-wise report
      responses:
        '200':
          description: Buyer report
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BuyerReport'

  # ── YARN TYPES ──────────────────────────────────────────────────────────────
  /yarn-types:
    get:
      tags: [yarn-types]
      operationId: listYarnTypes
      summary: List yarn types
      parameters:
        - name: includeArchived
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Yarn types list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/YarnTypeItem'
    post:
      tags: [yarn-types]
      operationId: createYarnType
      summary: Create a yarn type
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/YarnTypeInput'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/YarnTypeItem'

  # ── RAW MATERIALS ───────────────────────────────────────────────────────────
  /raw-materials:
    get:
      tags: [raw-materials]
      operationId: listRawMaterials
      summary: List all raw materials
      responses:
        '200':
          description: Raw materials list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RawMaterial'
    post:
      tags: [raw-materials]
      operationId: createRawMaterial
      summary: Create a raw material
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RawMaterialInput'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RawMaterial'

  /raw-materials/{id}:
    patch:
      tags: [raw-materials]
      operationId: updateRawMaterial
      summary: Update a raw material
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RawMaterialUpdate'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RawMaterial'
    delete:
      tags: [raw-materials]
      operationId: deleteRawMaterial
      summary: Delete a raw material
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Deleted

  # ── USERS ──────────────────────────────────────────────────────────────────
  /users:
    get:
      tags: [users]
      operationId: listUsers
      summary: List all users (admin only)
      responses:
        '200':
          description: Users list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AppUser'

  /users/{id}/role:
    patch:
      tags: [users]
      operationId: updateUserRole
      summary: Update a user's role (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRoleUpdate'
      responses:
        '200':
          description: Role updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppUser'

components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string

    SuccessEnvelope:
      type: object
      required: [success]
      properties:
        success:
          type: boolean

    # Auth schemas
    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']
    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'

    # Storage schemas
    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
        size:
          type: integer
        contentType:
          type: string
    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
        objectPath:
          type: string

    # Factory schemas
    Factory:
      type: object
      required: [id, factoryCode, name, status, createdAt]
      properties:
        id:
          type: integer
        factoryCode:
          type: string
        name:
          type: string
        location:
          type: [string, 'null']
        address:
          type: [string, 'null']
        contactPerson:
          type: [string, 'null']
        phone:
          type: [string, 'null']
        email:
          type: [string, 'null']
        yarnTypeId:
          type: [integer, 'null']
        dyeingPrice:
          type: [string, 'null']
        processLossBulk:
          type: [string, 'null']
        processLossSample:
          type: [string, 'null']
        status:
          type: boolean
        createdAt:
          type: string
          format: date-time

    FactoryInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        location:
          type: string
        address:
          type: string
        contactPerson:
          type: string
        phone:
          type: string
        email:
          type: string
        yarnTypeId:
          type: integer
        dyeingPrice:
          type: string
        processLossBulk:
          type: string
        processLossSample:
          type: string

    FactoryUpdate:
      type: object
      properties:
        name:
          type: string
        location:
          type: string
        address:
          type: string
        contactPerson:
          type: string
        phone:
          type: string
        email:
          type: string
        yarnTypeId:
          type: integer
        dyeingPrice:
          type: string
        processLossBulk:
          type: string
        processLossSample:
          type: string
        status:
          type: boolean

    # Yarn Dyeing Order schemas
    YarnDyeingOrderColorRow:
      type: object
      required: [id, orderId, colorName, qtyKg]
      properties:
        id:
          type: integer
        orderId:
          type: integer
        yarnCount:
          type: [string, 'null']
        colorName:
          type: string
        colorRef:
          type: [string, 'null']
        qtyKg:
          type: number
        remarks:
          type: [string, 'null']

    YarnDyeingOrderColorRowInput:
      type: object
      required: [colorName, qtyKg]
      properties:
        yarnCount:
          type: string
        colorName:
          type: string
        colorRef:
          type: string
        qtyKg:
          type: number
        remarks:
          type: string

    YarnDyeingOrder:
      type: object
      required: [id, orderNo, orderType, receiveDate, status, createdAt]
      properties:
        id:
          type: integer
        orderNo:
          type: string
        orderType:
          type: string
          enum: [Sample, Bulk]
        receiveDate:
          type: string
          format: date
        deliveryDate:
          type: [string, 'null']
          format: date
        customerGarmentsName:
          type: [string, 'null']
        jobNo:
          type: [string, 'null']
        unit:
          type: [string, 'null']
        factoryId:
          type: [integer, 'null']
        factoryName:
          type: [string, 'null']
        buyerName:
          type: [string, 'null']
        buyerAddress:
          type: [string, 'null']
        yarnType:
          type: [string, 'null']
        attn:
          type: [string, 'null']
        fromPerson:
          type: [string, 'null']
        yarnType:
          type: [string, 'null']
        remarks:
          type: [string, 'null']
        processLossPct:
          type: [number, 'null']
        processLossKg:
          type: [number, 'null']
        grandTotalKg:
          type: [number, 'null']
        status:
          type: string
        createdAt:
          type: string
          format: date-time

    YarnDyeingOrderDetail:
      allOf:
        - $ref: '#/components/schemas/YarnDyeingOrder'
        - type: object
          properties:
            colorRows:
              type: array
              items:
                $ref: '#/components/schemas/YarnDyeingOrderColorRow'

    YarnDyeingOrderListResponse:
      type: object
      required: [orders, total, page, pageSize]
      properties:
        orders:
          type: array
          items:
            $ref: '#/components/schemas/YarnDyeingOrderDetail'
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer

    YarnDyeingOrderInput:
      type: object
      required: [orderType, receiveDate, factoryId, colorRows]
      properties:
        orderNo:
          type: string
        orderType:
          type: string
          enum: [Sample, Bulk]
        receiveDate:
          type: string
          format: date
        deliveryDate:
          type: string
          format: date
        customerGarmentsName:
          type: string
        jobNo:
          type: string
        unit:
          type: string
        factoryId:
          type: integer
        buyerName:
          type: string
        buyerAddress:
          type: string
        attn:
          type: string
        fromPerson:
          type: string
        yarnType:
          type: string
        processLossPct:
          type: number
        processLossKg:
          type: number
        grandTotalKg:
          type: number
        colorRows:
          type: array
          items:
            $ref: '#/components/schemas/YarnDyeingOrderColorRowInput'

    YarnDyeingOrderUpdate:
      type: object
      properties:
        orderType:
          type: string
          enum: [Sample, Bulk]
        receiveDate:
          type: string
          format: date
        deliveryDate:
          type: string
          format: date
        customerGarmentsName:
          type: string
        jobNo:
          type: string
        unit:
          type: string
        factoryId:
          type: integer
        buyerName:
          type: string
        buyerAddress:
          type: string
        attn:
          type: string
        fromPerson:
          type: string
        yarnType:
          type: string
        processLossPct:
          type: number
        processLossKg:
          type: number
        grandTotalKg:
          type: number
        status:
          type: string

    # Dashboard schemas
    DashboardSummary:
      type: object
      required: [todayReceived, runningOrders, pendingOrders, deliveredOrders, totalKg, totalOrders]
      properties:
        todayReceived:
          type: integer
        runningOrders:
          type: integer
        pendingOrders:
          type: integer
        deliveredOrders:
          type: integer
        totalKg:
          type: number
        totalOrders:
          type: integer
        sampleOrders:
          type: integer
        bulkOrders:
          type: integer

    FactoryPerformance:
      type: object
      required: [factoryId, factoryName, totalOrders, completedOrders, pendingOrders, totalKg]
      properties:
        factoryId:
          type: integer
        factoryName:
          type: string
        totalOrders:
          type: integer
        completedOrders:
          type: integer
        pendingOrders:
          type: integer
        totalKg:
          type: number

    ActivityItem:
      type: object
      required: [id, orderNo, buyerName, status, createdAt]
      properties:
        id:
          type: integer
        orderNo:
          type: string
        buyerName:
          type: string
        factoryName:
          type: [string, 'null']
        status:
          type: string
        createdAt:
          type: string
          format: date-time

    # Report schemas
    DailyReport:
      type: object
      required: [date, ordersReceived, totalKg, deliveredOrders]
      properties:
        date:
          type: string
          format: date
        ordersReceived:
          type: integer
        totalKg:
          type: number
        deliveredOrders:
          type: integer
        orders:
          type: array
          items:
            $ref: '#/components/schemas/YarnDyeingOrder'

    MonthlyReport:
      type: object
      required: [year, month, sampleOrders, bulkOrders, totalKg, totalOrders]
      properties:
        year:
          type: integer
        month:
          type: integer
        sampleOrders:
