kind = "web"
previewPath = "/"
title = "Yarn Dyeing Management System"
version = "1.0.0"
id = "artifacts/ydms"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18365

[services.development]
run = "pnpm --filter @workspace/ydms run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ydms", "run", "build" ]
publicDir = "artifacts/ydms/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18365"
BASE_PATH = "/"
